<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新人女优 - 月度索引</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="monthly_styles.css">
    <link rel="stylesheet" href="index_styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <div>
                    <div class="logo-text">新人女优</div>
                    <div class="logo-subtitle">月度索引</div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="index-container">
            <h1 class="index-title">月度一覧</h1>
            <div id="monthGrid" class="month-grid">
                <div class="index-loading">
                    <div class="loading-spinner"></div>
                    <p>md ファイルを検索中...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2025 AV Archive. All data from <a href="https://seesaawiki.jp" target="_blank">seesaawiki</a></p>
    </footer>

    <script>
        const DEFAULT_MONTHLY_JSON = 'https://raw.githubusercontent.com/kkmike999/YouTube/refs/heads/main/seesaawiki.jp/md/monthly.json';

        // 从 URL 参数获取 json 地址，如 index.html?json=https://example.com/monthly.json
        function getMonthlyJsonUrl() {
            const params = new URLSearchParams(location.search);
            const jsonParam = params.get('json');
            return (jsonParam && jsonParam.startsWith('http')) ? jsonParam : DEFAULT_MONTHLY_JSON;
        }

        // year_month -> 2025年12月
        function formatYearMonth(ym) {
            const m = ym.match(/^(\d{4})_(\d{1,2})$/);
            if (m) return `${m[1]}年${parseInt(m[2], 10)}月`;
            return ym;
        }

        // 从 url 中提取 md 参数
        function getMdParam(urlStr) {
            if (!urlStr) return '';
            const idx = urlStr.indexOf('md=');
            if (idx === -1) return urlStr;
            return decodeURIComponent(urlStr.slice(idx + 3).split('&')[0]);
        }

        async function loadAndRender() {
            const grid = document.getElementById('monthGrid');

            try {
                const res = await fetch(getMonthlyJsonUrl());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const items = await res.json();

                if (!items || items.length === 0) {
                    grid.innerHTML = `
                        <div class="index-error">
                            <p>monthly.json にデータがありません</p>
                        </div>
                    `;
                    return;
                }

                // 按年份分组，确保不同年份的作品不在同一行
                const byYear = {};
                items.forEach((item) => {
                    const year = (item.year_month || '').split('_')[0] || 'other';
                    if (!byYear[year]) byYear[year] = [];
                    byYear[year].push(item);
                });
                const years = Object.keys(byYear).sort((a, b) => Number(b) - Number(a));

                grid.innerHTML = years.map((year) => {
                    // 同一年内：12月在开头，1月在末尾（按月份降序）
                    const yearItems = byYear[year].sort((a, b) => {
                        const ma = parseInt((a.year_month || '').split('_')[1], 10) || 0;
                        const mb = parseInt((b.year_month || '').split('_')[1], 10) || 0;
                        return mb - ma;
                    });
                    const cardsHtml = yearItems.map((item) => {
                        const title = formatYearMonth(item.year_month);
                        const mdUrl = getMdParam(item.url);
                        const href = `monthly.html?md=${encodeURIComponent(mdUrl)}`;
                        const cover = item.cover || '';
                        return `
                            <a class="month-card month-card--cover" href="${href}">
                                <div class="month-card__cover" style="background-image: url('${cover}')"></div>
                                <div class="month-card__info">
                                    <div class="month-label">${title}</div>
                                </div>
                            </a>
                        `;
                    }).join('');
                    return `
                        <section class="year-section">
                            <h2 class="year-header">${year}年</h2>
                            <div class="month-grid month-grid--by-year">${cardsHtml}</div>
                        </section>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = `
                    <div class="index-error">
                        <p>読み込みエラー: ${err.message}</p>
                        <p style="font-size:0.85rem;margin-top:0.5rem;">※ HTTP サーバーで開いてください (例: npx serve .)</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
