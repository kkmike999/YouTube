<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年12月 新人女优 - 作品精选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-pink: #ff3366;
            --accent-pink-light: #ff6699;
            --accent-purple: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: #2a2a3a;
            --glass-bg: rgba(18, 18, 26, 0.85);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 16px 48px rgba(255, 51, 102, 0.15);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 51, 102, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(30, 30, 50, 0.5) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-pink-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1.25rem 0.875rem 3rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 3px rgba(255, 51, 102, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-pink);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-pink), var(--accent-purple));
            border-radius: 2px;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Grid */
        .actress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Card */
        .actress-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
        }

        .actress-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(255, 51, 102, 0.3);
        }

        .card-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .actress-card:hover .card-image {
            transform: scale(1.08);
        }

        .card-image-blur {
            filter: blur(20px);
            transform: scale(1.1);
            transition: filter 0.3s ease;
        }

        .actress-card:hover .card-image-blur {
            filter: blur(0);
            transform: scale(1);
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        .actress-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card-galleries {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .gallery-thumb {
            width: 60px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            opacity: 0.7;
        }

        .gallery-thumb:hover {
            opacity: 1;
            border-color: var(--accent-pink);
            transform: scale(1.1);
        }

        /* Card Actions */
        .card-actions {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .action-btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), #ff1a53);
            color: white;
        }

        .action-btn-primary:hover {
            background: linear-gradient(135deg, #ff4477, var(--accent-pink));
            transform: translateY(-2px);
        }

        .action-btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .action-btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--accent-purple);
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--accent-pink);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        /* Image Gallery / Carousel */
        .gallery-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .gallery-main {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
        }

        .gallery-main-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 51, 102, 0.9);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            opacity: 0.7;
        }

        .gallery-nav:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
            background: var(--accent-pink);
        }

        .gallery-nav.prev {
            left: 1rem;
        }

        .gallery-nav.next {
            right: 1rem;
        }

        .gallery-nav svg {
            width: 24px;
            height: 24px;
        }

        .gallery-counter {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .gallery-thumbnails {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .gallery-thumb {
            width: 80px;
            height: 50px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            opacity: 0.6;
        }

        .gallery-thumb:hover {
            opacity: 1;
            border-color: var(--accent-pink-light);
        }

        .gallery-thumb.active {
            opacity: 1;
            border-color: var(--accent-pink);
            transform: scale(1.05);
        }

        .modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent-pink);
            text-align: center;
        }

        .modal-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
        }

        footer a {
            color: var(--accent-pink-light);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .search-container {
                max-width: 100%;
                order: 3;
            }

            .header-stats {
                width: 100%;
                justify-content: center;
            }

            main {
                padding: 1rem;
            }

            .actress-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .actress-name {
                font-size: 0.95rem;
            }

            .gallery-thumb {
                width: 45px;
                height: 30px;
            }

            .card-actions {
                flex-direction: column;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-pink);
        }
    </style>
</head>

        // Render cards
        function renderActresses(data) {
            const grid = document.getElementById('actressGrid');
            const totalCount = document.getElementById('totalCount');
            const resultsCount = document.getElementById('resultsCount');

            totalCount.textContent = data.length;
            resultsCount.textContent = `${data.length}件の結果`;

            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <p>検索結果がありません</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = data.map((actress, index) => `
                <div class="actress-card" data-name="${actress.name.toLowerCase()}" style="animation-delay: ${index * 0.05}s">
                    <div class="card-image-container" onclick="openModal(${index})">
                        <img class="card-image" src="${actress.cover}" alt="${actress.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%231a1a24%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23606070%22 font-size=%2212%22>No Image</text></svg>'">
                        <div class="card-overlay">
                            <h3 class="actress-name">${actress.name}</h3>
                        </div>
                    </div>
                    ${actress.posters.length > 0 ? `
                        <div class="card-galleries">
                            ${actress.posters.slice(0, 3).map((poster, i) => `
                                <img class="gallery-thumb" src="${poster}" alt="Gallery ${i + 1}" loading="lazy" onclick="event.stopPropagation(); openModal(${index})">
                            `).join('')}
                        </div>
                    ` : ''}
                    <div class="card-actions">
                        <a class="action-btn action-btn-primary" href="${actress.seesaawiki}" target="_blank">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            詳細
                        </a>
                        <a class="action-btn action-btn-secondary" href="${actress.javbus}" target="_blank">JavBus</a>
                        <a class="action-btn action-btn-secondary" href="${actress.missav}" target="_blank">MissAV</a>
                    </div>
                </div>
            `).join('');
        }

        // Modal
        let currentGalleryIndex = 0;
        let currentActressIndex = 0;
        let currentImages = [];

        function openModal(index) {
            const actress = actresses[index];
            currentActressIndex = index;
            currentImages = [actress.cover, ...actress.posters];
            currentGalleryIndex = 0;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <h2 class="modal-title">${actress.name}</h2>
                <div class="gallery-container">
                    <div class="gallery-main">
                        <img class="gallery-main-image" id="galleryMainImage" src="${currentImages[0]}" alt="${actress.name}">
                        ${currentImages.length > 1 ? `
                            <button class="gallery-nav prev" onclick="navigateGallery(-1)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <button class="gallery-nav next" onclick="navigateGallery(1)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                            <div class="gallery-counter"><span id="galleryCounter">1</span> / ${currentImages.length}</div>
                        ` : ''}
                    </div>
                    ${currentImages.length > 1 ? `
                        <div class="gallery-thumbnails">
                            ${currentImages.map((img, i) => `
                                <img class="gallery-thumb ${i === 0 ? 'active' : ''}"
                                     src="${img}"
                                     alt="Thumbnail ${i + 1}"
                                     onclick="switchGalleryImage(${i})"
                                     loading="lazy">
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="modal-links">
                    <a class="action-btn action-btn-primary" href="${actress.seesaawiki}" target="_blank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        seesaawikiで詳細を見る
                    </a>
                    <a class="action-btn action-btn-secondary" href="${actress.javbus}" target="_blank">JavBus</a>
                    <a class="action-btn action-btn-secondary" href="${actress.missav}" target="_blank">MissAV</a>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            // Add keyboard event listener
            document.addEventListener('keydown', handleModalKeydown);
        }

        function navigateGallery(direction) {
            currentGalleryIndex += direction;

            // Wrap around
            if (currentGalleryIndex < 0) {
                currentGalleryIndex = currentImages.length - 1;
            } else if (currentGalleryIndex >= currentImages.length) {
                currentGalleryIndex = 0;
            }

            updateGalleryImage();
        }

        function switchGalleryImage(index) {
            currentGalleryIndex = index;
            updateGalleryImage();
        }

        function updateGalleryImage() {
            const mainImage = document.getElementById('galleryMainImage');
            const counter = document.getElementById('galleryCounter');
            const thumbs = document.querySelectorAll('.gallery-thumb');

            if (mainImage) {
                mainImage.style.opacity = '0';
                setTimeout(() => {
                    mainImage.src = currentImages[currentGalleryIndex];
                    mainImage.style.opacity = '1';
                }, 150);
            }

            if (counter) {
                counter.textContent = currentGalleryIndex + 1;
            }

            thumbs.forEach((thumb, i) => {
                thumb.classList.toggle('active', i === currentGalleryIndex);
            });
        }

        function handleModalKeydown(e) {
            if (e.key === 'ArrowLeft') {
                navigateGallery(-1);
            } else if (e.key === 'ArrowRight') {
                navigateGallery(1);
            } else if (e.key === 'Escape') {
                closeModal();
            }
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = '';

            // Remove keyboard event listener
            document.removeEventListener('keydown', handleModalKeydown);
        }

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal on escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();

            if (query === '') {
                renderActresses(actresses);
                return;
            }

            const filtered = actresses.filter(actress =>
                actress.name.toLowerCase().includes(query)
            );

            renderActresses(filtered);
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', function() {
            renderActresses(actresses);
        });
    </script>
</body>
</html>
